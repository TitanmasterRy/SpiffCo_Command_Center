services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPIFFCO_HOST: 0.0.0.0
      SPIFFCO_PORT: "8000"
      SPIFFCO_ENVIRONMENT: production
      SPIFFCO_DEBUG: "false"
      SPIFFCO_DATABASE_URL: sqlite+aiosqlite:////data/spiffco.db
      # Point at your game machine running the FRM mod:
      SPIFFCO_FRM_BASE_URL: http://host.docker.internal:8080
      # Admin panel login (PBKDF2 hash, not the password itself; $ doubled for
      # compose escaping). Regenerate via app.services.admin_auth.hash_password.
      SPIFFCO_ADMIN_USERNAME: TitanmasterRy
      SPIFFCO_ADMIN_PASSWORD_HASH: pbkdf2_sha256$$600000$$40dcf582c7ca99ff16556fc7d095b690$$d255cdb2bf7c57f98005f55eb87c2854eb209e3e8c4d311101cc5077df815ede
      # Fixed signing secret so admin sessions survive backend restarts.
      SPIFFCO_ADMIN_SESSION_SECRET: 1f865b921f00b0669c83a8edbc2692ffb3dc527601f17f0a82b716d310a6207f
      # Require login for the whole site. The owner account is seeded from
      # SPIFFCO_ADMIN_USERNAME / _PASSWORD_HASH above; new sign-ups start pending
      # until approved in Admin > Accounts. Set to "false" to run without login.
      SPIFFCO_AUTH_ENABLED: "true"
      # SpiffCoBridge mod on the dedicated server (same machine); token must
      # match AuthToken in the server's Game.ini.
      SPIFFCO_ADMIN_COMMAND_URL: http://host.docker.internal:8091
      SPIFFCO_ADMIN_COMMAND_TOKEN: pfiv4y08q1cxmt6lgorbdzjweu952k7h3asn
    volumes:
      - spiffco-data:/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      # Host 8080 is taken by SmartFoxServer 2X on this machine; use 8090.
      - "8090:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  spiffco-data:
