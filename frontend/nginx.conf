server {
    listen 80;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;

        # Satisfactory saves are large; allow uploads up to the backend's
        # save_max_upload_mb (100 MB) plus multipart overhead. Keep this above
        # the backend limit so oversized files get the backend's 422 message
        # instead of a bare nginx 413.
        client_max_body_size 110m;
        proxy_request_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /ws {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }
}
